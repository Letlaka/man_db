[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "man-db"
version = "0.1.0"
description = "Reusable Django management command for PostgreSQL lifecycle, backup, and restore tasks."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Letlaka" }]
dependencies = [
    "Django>=5.2,<6.0",
    "psycopg[binary]>=3.3",
    "structlog>=25.0",
]

[tool.setuptools]
include-package-data = true
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
