name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Type-check with mypy
        run: python -m mypy

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest -q -m "not integration"

  integration-test:
    name: Integration tests
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres-version: ["14", "15", "16", "17", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install PostgreSQL client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl --fail --show-error --silent \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y "postgresql-client-${{ matrix.postgres-version }}"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run integration tests
        run: python -m pytest -q -m integration
        env:
          POSTGRES_VERSION: ${{ matrix.postgres-version }}
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          PG_DUMP_PATH: /usr/lib/postgresql/${{ matrix.postgres-version }}/bin/pg_dump
          PG_RESTORE_PATH: /usr/lib/postgresql/${{ matrix.postgres-version }}/bin/pg_restore
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: test_user
          PGPASSWORD: test_password
          PGSSLMODE: disable
